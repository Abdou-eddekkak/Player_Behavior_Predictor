<!DOCTYPE html>
<html>
<head>
    <title>Player Behavior AI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background: #f8fafc;
            margin: 0;
            padding: 40px;
            color: #0f172a;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .card h2 {
            margin-top: 0;
            font-size: 18px;
        }

        .sequence-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #cbd5f5;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .buttons {
            margin-top: 15px;
        }

        button {
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }

        .primary {
            background: #3b82f6;
            color: white;
        }

        .secondary {
            background: #e2e8f0;
        }

        button:hover {
            opacity: 0.9;
        }

        #result {
            font-size: 18px;
            margin-top: 10px;
            font-weight: 500;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: #dbeafe;
            color: #1d4ed8;
            font-size: 13px;
            margin-left: 10px;
        }

        canvas {
            margin-top: 20px;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Player Behavior AI</h1>
    <div class="subtitle">Sequence-based prediction using LSTM model</div>

    <div class="grid">

        <!-- INPUT CARD -->
        <div class="card">
            <h2>Input Sequence</h2>
            <div id="sequence"></div>

            <div class="buttons">
                <button class="secondary" onclick="fillRandom()">Random</button>
                <button class="primary" onclick="predict()">Predict</button>
            </div>
        </div>

        <!-- OUTPUT CARD -->
        <div class="card">
            <h2>Prediction</h2>
            <div id="result">
                Waiting for input...
            </div>

            <canvas id="chart"></canvas>
        </div>

    </div>

</div>

<script>
let chart;

// Create sequence inputs
const container = document.getElementById("sequence");

for (let i = 0; i < 5; i++) {
    let div = document.createElement("div");
    div.className = "sequence-row";

    for (let j = 0; j < 5; j++) {
        let input = document.createElement("input");
        input.type = "number";
        input.placeholder = `t${i+1} f${j+1}`;
        div.appendChild(input);
    }

    container.appendChild(div);
}

// Random generator
function fillRandom() {
    const rows = document.querySelectorAll(".sequence-row");

    rows.forEach(row => {
        const inputs = row.querySelectorAll("input");

        inputs[0].value = Math.floor(Math.random() * 100);
        inputs[1].value = (Math.random() * 10).toFixed(2);
        inputs[2].value = Math.floor(Math.random() * 50);
        inputs[3].value = Math.floor(Math.random() * 20);
        inputs[4].value = Math.floor(Math.random() * 10);
    });
}

// Get sequence safely
function getSequence() {
    const rows = document.querySelectorAll(".sequence-row");
    const sequence = [];

    rows.forEach(row => {
        const inputs = row.querySelectorAll("input");

        const step = [];

        inputs.forEach(input => {
            let val = parseFloat(input.value);
            if (isNaN(val)) val = 0;
            step.push(val);
        });

        sequence.push(step);
    });

    return sequence;
}

// Predict
async function predict() {
    document.getElementById("result").innerText = "Predicting...";

    const response = await fetch("http://127.0.0.1:8000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            sequence: getSequence()
        })
    });

    const result = await response.json();

    document.getElementById("result").innerHTML =
        `Prediction: <span class="badge">${result.prediction}</span>`;

    updateChart(result.probabilities);
}

// Chart update
function updateChart(probs) {
    const labels = Object.keys(probs);
    const values = Object.values(probs);

    if (chart) chart.destroy();

    const ctx = document.getElementById("chart").getContext("2d");

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Confidence",
                data: values
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true,
                    max: 1
                }
            }
        }
    });
}

// Auto-fill
fillRandom();

</script>

</body>
</html>
